baseURL = "https://mohamedalyamin.com/"
languageCode = "en-US"
title = "Mohamed Aly Amin – Security & Infrastructure Engineer"
timeZone = "Europe/Istanbul"

# Task 6 removes the dead WordPress <meta name="generator"> tag (allow-list
# #7). Without this, Hugo backfills its own generator meta tag on any page
# that has none, which would silently reintroduce generator metadata the
# task is meant to eliminate.
disableHugoGeneratorInject = true

# Only the categories taxonomy is used (sidebar widget); no tags.
[taxonomies]
  category = "categories"

[pagination]
  pagerSize = 10

# Home emits HTML + RSS (allow-list #6) + the client-side search index.
[outputs]
  home = ["HTML", "RSS", "SearchIndex"]

# Go's html/template (Hugo's default for the HTML format) applies contextual
# autoescaping. The original rationale for this override — preserving verbatim
# WordPress-export bytes in carved partials — is obsolete: those partials were
# deleted (WP cleanup, PR #7). The override is kept anyway: a build/diff check
# (2026-07-12, see .superpowers/sdd/final-fixes-report.md) showed re-enabling
# autoescaping still changes 10 of 11 rendered pages today. It silently strips
# the maintainer comment in section-skills.html and the DOM-XSS-rationale JS
# comment in search's inline script, entity-escapes "&"/"+" through owner-
# authored body text, and rewrites the hand-built ld+json block ("/" ->
# "\/"). Templates already escape explicitly where it matters (safeHTML for
# owner-controlled HTML fragments, jsonify+safeJS for JSON-in-script) — all
# interpolated data is site-owner-controlled, not third-party input, so the
# blanket contextual escaper buys no safety here, only unpredictable diffs.
# Revisit if the ld+json block moves to jsonify and the two comments above
# are removed or relocated out of the markup they annotate.
[outputFormats.HTML]
  isPlainText = true

[outputFormats.SearchIndex]
  mediaType = "application/json"
  baseName = "search-index"
  isPlainText = true
  notAlternative = true

[markup.goldmark.renderer]
  # Blog posts may embed raw HTML (same trust level as the site itself).
  unsafe = true
