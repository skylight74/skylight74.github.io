# Role-preset content packs. Values approved in mockup v2 (2026-07-12 spec).
# Content lane may tune wording here; keys/structure belong to the rebuild.
stats:
  eps:     { num: "~400k/s", label: "security events — Go detection engine, 80+ sources", count: "400", pre: "~", post: "k/s" }
  acc:     { num: "98.11%",  label: "IDS accuracy — first-author, AINA 2024 (Springer)", count: "98.11", post: "%" }
  mvp:     { num: "3 mo",    label: "SIEM/SOAR MVP shipped vs 6–12 mo company norm", count: "3", post: " mo" }
  team:    { num: "6 eng",   label: "DevSecOps team formed, led, and trained", count: "6", post: " eng" }
  users:   { num: "270k",    label: "user platform rebuilt as 10 microservices on AWS", count: "270", post: "k" }
  papers:  { num: "2",       label: "peer-reviewed papers — AINA (Springer) · MedPower, TÜBİTAK-funded", count: "2" }
  trained: { num: "4+",      label: "engineers & ASELSAN partners trained", count: "4", post: "+" }
  # Added 2026-07-13 (Mohamed: "give what's needed not what exists"). All attested:
  # sources — same claim as eps label (resume: "80+ sources"); listings — resume freelance
  # bullet "360k+ cumulative listings"; members — volunteering.yaml "200+ members";
  # ventures — resume Castrum bullet "15–20 startup ventures".
  sources:  { num: "80+",    label: "event sources integrated — one Go detection engine", count: "80", post: "+" }
  listings: { num: "360k+",  label: "cumulative listings — 270k-user platform, 10 microservices", count: "360", post: "k+" }
  members:  { num: "200+",   label: "members — chaired METU International Students Association", count: "200", post: "+" }
  ventures: { num: "15–20",  label: "startup ventures technically assessed for investment", count: "15", post: "–20" }
  # Added 2026-07-13, Mohamed direct attestation ("1 conference…"; "I used to teach the
  # cybersecurity class in Istanbul Aydın via Interprobe"). Conference = AINA 2024
  # presentation (publications.yaml note: "Presented in Japan").
  conf:     { num: "1",      label: "international conference presentation — AINA 2024, Japan" }
  # Title: Mohamed proposed "visiting professor"; shipped as "visiting lecturer" per the
  # exactly-true rule (industry-guest teaching ≠ professorship; lecturer survives checks).
  # Course name attested by Mohamed 2026-07-13: "Introduction to Cybersecurity".
  taught:   { num: "1",      label: "course taught as visiting lecturer — Introduction to Cybersecurity, Istanbul Aydın University" }
