{{ $p := .p }}
<div class="in reveal">
  {{ if eq $p.voice "editorial" }}<div class="sec-label">Writing</div>{{ else }}<div class="sec-label"><b>08</b>writing --latest</div>{{ end }}
  <h2>Writing</h2>
  {{ range first 3 (where site.RegularPages "Section" "blog") }}<div class="post"><div class="d">{{ .Date.Format "2006-01-02" }}</div><div><a href="{{ .RelPermalink }}{{ with $.page.Params.preset }}#skin={{ $.p.skin }}&role={{ . }}{{ end }}">{{ .Title }}</a><p>{{ .Summary | plainify | truncate 90 }}</p></div></div>{{ end }}
  <div style="margin-top:var(--s7)"><a class="u" href="/blog/{{ with .page.Params.preset }}#skin={{ $.p.skin }}&role={{ . }}{{ end }}" style="font:500 11px var(--mono);letter-spacing:.08em;color:var(--act);text-decoration:none">all posts →</a></div>
</div>
