<!DOCTYPE html>
<html lang="en-US">

<head>

    <title>404 &#8211; Page not found &#8211; Mohamed Aly Amin</title>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
        }

        body {
            min-height: 100vh;
            background: #0a2a6e;
            color: #eaf1ff;
            font-family: ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, Consolas, monospace;
            display: flex;
            align-items: center;
            padding: 8vmin;
            line-height: 1.55;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .wrap {
            width: 100%;
            max-width: 760px;
        }

        .face {
            font-size: clamp(64px, 13vw, 128px);
            line-height: 1;
            margin: 0 0 28px;
        }

        h1 {
            font-weight: 600;
            font-size: clamp(19px, 3.2vw, 28px);
            margin: 0 0 16px;
        }

        p {
            margin: 0 0 12px;
            color: #b7cbf0;
            font-size: clamp(14px, 1.9vw, 16px);
        }

        .pct {
            color: #eaf1ff;
        }

        .term {
            margin: 30px 0 26px;
            padding: 18px 20px;
            background: rgba(0, 0, 0, .22);
            border-radius: 4px;
            font-size: clamp(12px, 1.7vw, 14.5px);
            color: #cfe0ff;
            overflow-x: auto;
        }

        .term div {
            white-space: nowrap;
        }

        .term .c {
            color: #6fa8ff;
        }

        .term .k {
            color: #eaf1ff;
        }

        .cur {
            display: inline-block;
            width: .55em;
            height: 1.05em;
            background: #6fa8ff;
            vertical-align: -.15em;
            animation: blink 1.1s steps(1) infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        a.home {
            display: inline-block;
            color: #0a2a6e;
            background: #eaf1ff;
            text-decoration: none;
            font-weight: 600;
            padding: 12px 22px;
            border-radius: 3px;
            font-size: clamp(13px, 1.7vw, 15px);
        }

        a.home:hover {
            background: #fff;
        }
    
        .cstar { position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%); pointer-events: none; z-index: 0; }
        .c1 { width: 100vmin; height: 100vmin; color: #6fa8ff; opacity: .10; animation: cspin 120s linear infinite; }
        .c2 { width: 78vmin; height: 78vmin; color: #b7cbf0; opacity: .10; animation: cspinr 95s linear infinite; }
        .c3 { width: 58vmin; height: 58vmin; color: #6fa8ff; opacity: .11; animation: cspin 72s linear infinite; }
        .c4 { width: 41vmin; height: 41vmin; color: #b7cbf0; opacity: .12; animation: cspinr 52s linear infinite; }
        .c5 { width: 26vmin; height: 26vmin; color: #6fa8ff; opacity: .13; animation: cspin 36s linear infinite; }
        @keyframes cspin  { from { transform: translate(-50%,-50%) rotate(0); } to { transform: translate(-50%,-50%) rotate(360deg); } }
        @keyframes cspinr { from { transform: translate(-50%,-50%) rotate(0); } to { transform: translate(-50%,-50%) rotate(-360deg); } }
        @media (prefers-reduced-motion: reduce) { .cstar { animation: none; } }
        main.wrap { position: relative; z-index: 1; }
    </style>
</head>

</html>
