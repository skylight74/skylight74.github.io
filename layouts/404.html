<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>404 &#8211; Page not found &#8211; The Legend</title>
    <meta name="robots" content="noindex">
    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
        }

        body {
            min-height: 100vh;
            background: #0a2a6e;
            color: #eaf1ff;
            font-family: ui-monospace, 'Cascadia Code', 'JetBrains Mono', 'Fira Code', 'SF Mono', Menlo, Consolas, monospace;
            display: flex;
            align-items: center;
            padding: 8vmin;
            line-height: 1.55;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        .wrap {
            width: 100%;
            max-width: 760px;
        }

        .face {
            font-size: clamp(64px, 13vw, 128px);
            line-height: 1;
            margin: 0 0 28px;
        }

        h1 {
            font-weight: 600;
            font-size: clamp(19px, 3.2vw, 28px);
            margin: 0 0 16px;
        }

        p {
            margin: 0 0 12px;
            color: #b7cbf0;
            font-size: clamp(14px, 1.9vw, 16px);
        }

        .pct {
            color: #eaf1ff;
        }

        .term {
            margin: 30px 0 26px;
            padding: 18px 20px;
            background: rgba(0, 0, 0, .22);
            border-radius: 4px;
            font-size: clamp(12px, 1.7vw, 14.5px);
            color: #cfe0ff;
            overflow-x: auto;
        }

        .term div {
            white-space: nowrap;
        }

        .term .c {
            color: #6fa8ff;
        }

        .term .k {
            color: #eaf1ff;
        }

        .cur {
            display: inline-block;
            width: .55em;
            height: 1.05em;
            background: #6fa8ff;
            vertical-align: -.15em;
            animation: blink 1.1s steps(1) infinite;
        }

        @keyframes blink {
            50% {
                opacity: 0;
            }
        }

        a.home {
            display: inline-block;
            color: #0a2a6e;
            background: #eaf1ff;
            text-decoration: none;
            font-weight: 600;
            padding: 12px 22px;
            border-radius: 3px;
            font-size: clamp(13px, 1.7vw, 15px);
        }

        a.home:hover {
            background: #fff;
        }
    </style>
</head>

<body>
    <main class="wrap">
        <div class="face">:(</div>
        <h1>This page ran into a problem and couldn&rsquo;t be found.</h1>
        <p>We&rsquo;re collecting the crash dump &mdash; then you can be on your way.</p>
        <p><span class="pct">404%</span> complete</p>
        <div class="term">
            <div><span class="c">root@the-legend</span>:<span class="c">~</span># locate "$REQUESTED_URL"</div>
            <div>locate: 0 matches &mdash; STOP CODE: <span class="k">PAGE_NOT_FOUND (0x194)</span></div>
            <div><span class="c">root@the-legend</span>:<span class="c">~</span># <span class="cur"></span></div>
        </div>
        <a class="home" href="/">cd /&nbsp;&nbsp;&#35; back to homepage</a>
    </main>
</body>

</html>
