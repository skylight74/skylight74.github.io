<!DOCTYPE html>
<html lang="en-US">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>Page not found &#8211; The Legend</title>
    <meta name="robots" content="noindex">
    <link rel="stylesheet"
        href="https://fonts.googleapis.com/css?family=Space+Grotesk:300,regular,500,600,700&subset=latin,latin-ext,vietnamese&display=swap"
        type="text/css" media="all">
    <style>
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #292922;
            background: linear-gradient(to bottom right, #292922 0%, #c7dbe7 100%);
            font-family: 'Space Grotesk', sans-serif;
        }

        .error-404 {
            max-width: 480px;
            margin: 40px;
            padding: 50px 40px;
            background: #ffffff;
            border-radius: 4px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.25);
        }

        .error-404 .title {
            margin: 0 0 20px 0;
            font-size: 24px;
            font-weight: 600;
            color: #292922;
        }

        .error-404 p {
            margin: 0 0 10px 0;
            color: #646464;
        }

        .error-404 .lnk {
            display: inline-block;
            margin-top: 20px;
            padding: 0 30px;
            height: 50px;
            line-height: 50px;
            border-radius: 4px;
            background: #292922;
            color: #ffffff;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.05em;
        }

        .error-404 .lnk:hover {
            opacity: 0.85;
        }
    </style>
</head>

<body>
    <div class="error-404">
        <div class="content">
            <div class="title"><span class="title_inner">Page not found</span></div>
            <p>Nothing lives at this address.</p>
            <p><a class="lnk" href="/"><span class="text">Back to the homepage</span></a></p>
        </div>
    </div>
</body>

</html>
