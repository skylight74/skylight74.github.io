{{ define "main" }}
<section class="card" id="search">
  <div class="in reveal">
    <div class="sec-label"><b>07</b>search --writing</div>
    <h1>Search</h1>
    <p class="imp-note" id="search-summary">Loading&hellip;</p>
    <div id="search-results"></div>
  </div>
</section>
<script>
(function () {
  var q = (new URLSearchParams(window.location.search).get('s') || '').trim();
  var summary = document.getElementById('search-summary');
  var box = document.getElementById('search-results');
  fetch('/search-index.json').then(function (r) { return r.json(); }).then(function (posts) {
    var hits = q ? posts.filter(function (p) {
      var hay = (p.title + ' ' + p.content + ' ' + (p.categories || []).join(' ')).toLowerCase();
      return hay.indexOf(q.toLowerCase()) !== -1;
    }) : posts;
    summary.textContent = q
      ? hits.length + ' result' + (hits.length === 1 ? '' : 's') + ' for “' + q + '”'
      : 'All ' + hits.length + ' posts';
    // Build results with DOM APIs (textContent / setAttribute) rather than
    // innerHTML, so index values can never inject markup (no DOM-XSS).
    box.textContent = '';
    if (!hits.length) {
      var none = document.createElement('p');
      none.className = 'imp-note';
      none.textContent = 'No posts matched. Try a shorter word.';
      box.appendChild(none);
      return;
    }
    hits.forEach(function (p) {
      var item = document.createElement('div');
      item.className = 'post';
      var date = document.createElement('div');
      date.className = 'd';
      date.textContent = p.date;
      var body = document.createElement('div');
      var a = document.createElement('a');
      a.setAttribute('href', p.url);
      a.textContent = p.title;
      body.appendChild(a);
      item.appendChild(date);
      item.appendChild(body);
      box.appendChild(item);
    });
  }).catch(function () { summary.textContent = 'Search index failed to load.'; });
})();
</script>
{{ end }}
