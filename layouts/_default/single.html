{{ define "main" }}
<section class="card page" id="post">
  <div class="in reveal">
    <div class="sec-label"><b>07</b>writing --post</div>
    <h1>{{ .Title }}</h1>
    <div class="post-meta">{{ .Date.Format "2006-01-02" }}{{ range .Params.categories }} &middot; <a href="/categories/{{ . | urlize }}/">{{ . }}</a>{{ end }}</div>
    <div class="prose">{{ .Content | safeHTML }}</div>
    <p style="margin-top:var(--s6)"><a class="btn ghost" href="/blog/">&laquo; All posts</a></p>
  </div>
</section>
{{ end }}
